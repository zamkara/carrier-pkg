name: release

on:
  push:
    branches: [master]
    tags: [v*]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
            TAG="$GITHUB_REF_NAME"
          else
            VER="0.1.0-${GITHUB_SHA:0:8}"
            TAG="ci-${GITHUB_SHA:0:8}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: inject version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - run: cargo build --release

      - name: package
        run: |
          mkdir -p dist
          cp target/release/carrier dist/carrier
          tar czf "dist/carrier-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz" -C target/release carrier
          echo "archive=carrier-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz" >> "$GITHUB_ENV"

      - name: create release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            echo "release $TAG already exists — uploading assets"
          else
            gh release create "$TAG" \
              --title "carrier $VERSION" \
              --notes "" \
              --generate-notes
          fi
          gh release upload "$TAG" \
            "dist/${{ env.archive }}" \
            "dist/carrier" \
            --clobber
