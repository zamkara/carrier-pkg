name: release

on:
  push:
    branches: [master]
    tags: [v*]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="0.1.0-${GITHUB_SHA:0:8}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: inject version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - run: cargo build --release

      - name: package
        run: |
          ARCHIVE="carrier-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz"
          mkdir -p dist
          tar czf "dist/$ARCHIVE" -C target/release carrier
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: carrier-${{ steps.version.outputs.version }}
          path: dist/${{ env.archive }}

      - name: create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: carrier ${{ github.ref_name }}
          files: dist/${{ env.archive }}
          generate_release_notes: true
